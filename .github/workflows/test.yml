name: blender-mcp CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ addon/ tools_*.py mcp_server.py --ignore E501,F401,E402

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install mcp
      - name: Test imports and unit tests
        run: |
          python -m pytest tests/test_server.py tests/test_handlers.py -v -x --tb=short
      - name: Verify py_compile
        run: |
          for f in $(find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./*cache*" -not -path "./.git/*"); do python -m py_compile "$f" 2>/dev/null || echo "FAIL: $f"; done
      - name: Test tool registration
        run: |
          python -c "
import sys; sys.path.insert(0, '.'); sys.path.insert(0, 'src')
from mcp.server.fastmcp import FastMCP
from blender_mcp.tools import (
    polyhaven, sketchfab, hyper3d, hunyuan, ambientcg,
    shader_nodes, animation, geometry_nodes, render,
    io, uv_texture, batch, rigging, scene_utils, printing,
    analysis, docs, viewport,
)
mcp = FastMCP('test')
for mod in [polyhaven, sketchfab, hyper3d, hunyuan, ambientcg,
             shader_nodes, animation, geometry_nodes, render,
             io, uv_texture, batch, rigging, scene_utils, printing,
             analysis, docs, viewport]:
    mod.register_tools(mcp)
tools = list(mcp._tool_manager.list_tools())
assert len(tools) >= 65, f'Only {len(tools)} tools registered'
print(f'✅ {len(tools)} tools registered')
          "
