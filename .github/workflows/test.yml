name: blender-mcp CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ addon/ tools_*.py mcp_server.py --ignore E501,F401,E402

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install mcp
      - name: Test imports and unit tests
        run: |
          python -m pytest tests/test_server.py tests/test_handlers.py -v -x --tb=short
      - name: Verify py_compile
        run: |
          for f in $(find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./*cache*" -not -path "./.git/*"); do python -m py_compile "$f" 2>/dev/null || echo "FAIL: $f"; done
      - name: Test tool registration
        run: |
          python -c "
import sys; sys.path.insert(0, '.')
from mcp.server.fastmcp import FastMCP
mcp = FastMCP('test')
import tools_polyhaven, tools_sketchfab, tools_hyper3d, tools_hunyuan, tools_ambientcg
import tools_shader_nodes, tools_animation, tools_geometry_nodes, tools_render
import tools_io, tools_uv_texture, tools_batch, tools_rigging, tools_scene_utils, tools_printing
for mod in [tools_polyhaven, tools_sketchfab, tools_hyper3d, tools_hunyuan, tools_ambientcg,
             tools_shader_nodes, tools_animation, tools_geometry_nodes, tools_render,
             tools_io, tools_uv_texture, tools_batch, tools_rigging, tools_scene_utils, tools_printing]:
    mod.register_tools(mcp)
tools = list(mcp._tool_manager.list_tools())
assert len(tools) >= 60, f'Only {len(tools)} tools registered'
print(f'✅ {len(tools)} tools registered')
          "
